<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word of the Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --paper: #f5f0e8;
      --cream: #ede8dc;
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --muted: #8a8070;
      --success: #3d7a5c;
      --error: #8b2e2e;
      --border: #c8bfaa;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.06) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .date-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    h1 span { color: var(--gold); }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 1rem auto 0;
    }

    main {
      width: 100%;
      max-width: 600px;
      animation: fadeUp 0.7s ease 0.15s both;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 4px 4px 0 var(--cream);
    }

    .part-of-speech {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    .definition {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      line-height: 1.7;
      color: var(--ink);
    }

    .word-length-hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 1rem;
    }

    .boxes-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .letter-boxes {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .letter-box-wrapper {
      position: relative;
      width: 48px;
      height: 56px;
    }

    .letter-box {
      width: 100%;
      height: 100%;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      background: white;
      text-transform: uppercase;
      pointer-events: none;
      transition: border-color 0.2s, background 0.2s;
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }

    .letter-input {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 2;
      cursor: text;
      font-size: 16px;
      border: none;
      background: transparent;
    }

    .letter-input:disabled { cursor: default; pointer-events: none; }

    .letter-box.active {
      border-color: var(--gold);
      background: #fffdf7;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    .letter-box.filled { border-color: var(--ink); }

    .letter-box.correct {
      border-color: var(--success);
      background: #f0f7f3;
      color: var(--success);
      animation: pop 0.3s ease;
    }

    .letter-box.wrong {
      border-color: var(--error);
      background: #fdf3f3;
      color: var(--error);
      animation: shake 0.4s ease;
    }

    .letter-box.hint {
      border-color: var(--gold);
      background: #fffbf0;
      color: var(--gold);
    }

    .letter-box.revealed {
      border-color: var(--muted);
      background: #f5f2ec;
      color: var(--muted);
    }

    .actions {
      margin-top: 0.5rem;
    }

    .actions-row-main {
      display: flex;
      gap: 0.75rem;
      width: 100%;
    }

    .actions-row-secondary {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.75rem;
    }

    .btn {
      flex: 1;
      padding: 0.875rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1.5px solid transparent;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .btn-primary:hover:not(:disabled) { background: #333; }

    .btn-primary:disabled {
      background: var(--border);
      border-color: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) { border-color: var(--ink); }

    .btn-secondary:disabled {
      color: var(--muted);
      border-color: var(--border);
      cursor: not-allowed;
    }

    .btn-hint {
      background: transparent;
      color: var(--gold);
      border-color: var(--gold-light);
      flex: 1;
    }

    .btn-hint:hover:not(:disabled) {
      background: #fffbf0;
      border-color: var(--gold);
    }

    .btn-hint:disabled {
      color: var(--border);
      border-color: var(--border);
      cursor: not-allowed;
    }

    .btn-give-up {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.25rem 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }

    .btn-give-up:hover:not(:disabled) { color: var(--error); text-decoration: none; }
    .btn-give-up:disabled { color: var(--border); cursor: not-allowed; text-decoration: none; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
      box-shadow: 8px 8px 0 var(--cream);
      animation: fadeUp 0.2s ease;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .modal-body {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .modal-actions { display: flex; gap: 0.75rem; }

    .result {
      margin-top: 1.5rem;
      padding: 1.25rem 1.5rem;
      border-radius: 2px;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      display: none;
      animation: fadeUp 0.4s ease;
    }

    .result.success {
      background: #f0f7f3;
      border: 1.5px solid var(--success);
      color: var(--success);
      display: block;
    }

    .result.error {
      background: #fdf3f3;
      border: 1.5px solid var(--error);
      color: var(--error);
      display: block;
    }

    .result.giveup {
      background: #f5f2ec;
      border: 1.5px solid var(--muted);
      color: var(--muted);
      display: block;
    }

    .result-emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      font-style: normal;
      display: block;
      margin-bottom: 0.25rem;
    }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .loading-dots {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s ease infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    .error-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--error);
    }

    .error-state p { font-size: 0.85rem; margin-top: 0.5rem; color: var(--muted); }

    footer {
      margin-top: 3rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @media (max-width: 480px) {
      .letter-box-wrapper { width: 40px; height: 48px; }
      .letter-box { font-size: 1.25rem; }
      .letter-boxes { gap: 0.35rem; }
    }
  </style>
</head>
<body>

<header>
  <p class="date-label" id="date-label">Loading...</p>
  <h1>Word of the <span>Day</span></h1>
  <div class="divider"></div>
</header>

<main>
  <div id="loading-state" class="loading">
    <p>Fetching today's word...</p>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <div id="error-state" class="error-state" style="display:none">
    <p class="result-emoji">📖</p>
    <strong>No word available today</strong>
    <p>Check back later or come back tomorrow.</p>
  </div>

  <div id="game" style="display:none">
    <div class="card">
      <p class="part-of-speech" id="part-of-speech"></p>
      <p class="definition" id="definition"></p>
      <p class="word-length-hint" id="word-length-hint"></p>
    </div>

    <p class="boxes-label">Your guess</p>
    <div class="letter-boxes" id="letter-boxes"></div>

    <div class="actions">
      <div class="actions-row-main">
        <button class="btn btn-secondary" id="clear-btn">Clear</button>
        <button class="btn btn-hint" id="hint-btn">Hint (3 left)</button>
        <button class="btn btn-primary" id="guess-btn" disabled>Guess</button>
      </div>
      <div class="actions-row-secondary">
        <button class="btn-give-up" id="give-up-btn">Give up</button>
      </div>
    </div>

    <div class="result" id="result"></div>
  </div>
</main>

<!-- Confirm modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <p class="modal-title">Are you sure?</p>
    <p class="modal-body">This will reveal today's word and end the game. You won't be able to guess again today.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Yes, reveal it</button>
    </div>
  </div>
</div>

<footer>
  <p>A daily word challenge &mdash; come back tomorrow for a new word</p>
</footer>

<script>
  const API_BASE = 'https://8lv1i6gga2.execute-api.eu-west-1.amazonaws.com/Prod/api/v1/word';
  const MAX_HINTS = 3;

  let wordLength = 0;
  let currentGuess = [];
  let gameOver = false;
  let focusedIndex = 0;
  let hintsUsed = 0;
  let revealedPositions = []; // [{position, letter}]

  const els = {
    loading: document.getElementById('loading-state'),
    errorState: document.getElementById('error-state'),
    game: document.getElementById('game'),
    dateLabel: document.getElementById('date-label'),
    partOfSpeech: document.getElementById('part-of-speech'),
    definition: document.getElementById('definition'),
    wordLengthHint: document.getElementById('word-length-hint'),
    letterBoxes: document.getElementById('letter-boxes'),
    clearBtn: document.getElementById('clear-btn'),
    hintBtn: document.getElementById('hint-btn'),
    guessBtn: document.getElementById('guess-btn'),
    giveUpBtn: document.getElementById('give-up-btn'),
    result: document.getElementById('result'),
    modalOverlay: document.getElementById('modal-overlay'),
    modalCancel: document.getElementById('modal-cancel'),
    modalConfirm: document.getElementById('modal-confirm'),
  };

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    }).toUpperCase();
  }

  function isHintPosition(idx) {
    return revealedPositions.some(h => h.position === idx);
  }

  function buildBoxes(length) {
    els.letterBoxes.innerHTML = '';
    currentGuess = new Array(length).fill('');

    for (let i = 0; i < length; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'letter-box-wrapper';

      const box = document.createElement('div');
      box.className = 'letter-box';
      box.dataset.index = i;

      const input = document.createElement('input');
      input.className = 'letter-input';
      input.type = 'text';
      input.inputMode = 'text';
      input.autocomplete = 'off';
      input.autocorrect = 'off';
      input.autocapitalize = 'off';
      input.spellcheck = false;
      input.maxLength = 2;
      input.dataset.index = i;

      input.addEventListener('focus', () => {
        if (!gameOver) { focusedIndex = i; updateActiveBox(); }
      });

      input.addEventListener('input', (e) => {
        if (gameOver) return;
        const idx = parseInt(e.target.dataset.index);
        if (isHintPosition(idx)) return;
        const raw = e.target.value.replace(/[^a-zA-Z]/g, '');
        if (!raw) {
          currentGuess[idx] = '';
          e.target.value = '';
          updateBoxDisplay();
          updateGuessBtn();
          return;
        }
        const char = raw[raw.length - 1].toLowerCase();
        currentGuess[idx] = char;
        e.target.value = char;
        updateBoxDisplay();
        updateGuessBtn();
        let next = idx + 1;
        while (next < wordLength && isHintPosition(next)) next++;
        if (next < wordLength) focusBox(next);
      });

      input.addEventListener('keydown', (e) => {
        if (gameOver) return;
        const idx = parseInt(e.target.dataset.index);
        if (e.key === 'Backspace') {
          if (!isHintPosition(idx) && currentGuess[idx]) {
            currentGuess[idx] = '';
            e.target.value = '';
            updateBoxDisplay();
            updateGuessBtn();
          } else {
            let prev = idx - 1;
            while (prev >= 0 && isHintPosition(prev)) prev--;
            if (prev >= 0) {
              currentGuess[prev] = '';
              focusBox(prev);
              updateBoxDisplay();
              updateGuessBtn();
            }
          }
          e.preventDefault();
        }
        if (e.key === 'Enter' && currentGuess.join('').length === wordLength) submitGuess();
        if (e.key === 'ArrowLeft' && idx > 0) focusBox(idx - 1);
        if (e.key === 'ArrowRight' && idx < wordLength - 1) focusBox(idx + 1);
      });

      wrapper.appendChild(box);
      wrapper.appendChild(input);
      els.letterBoxes.appendChild(wrapper);
    }

    updateBoxDisplay();
    updateActiveBox();
  }

  function focusBox(idx) {
    focusedIndex = idx;
    const inputs = els.letterBoxes.querySelectorAll('.letter-input');
    if (inputs[idx]) inputs[idx].focus();
    updateActiveBox();
  }

  function updateActiveBox() {
    const boxes = els.letterBoxes.querySelectorAll('.letter-box');
    boxes.forEach((box, i) => {
      box.classList.remove('active');
      if (i === focusedIndex && !gameOver) box.classList.add('active');
    });
  }

  function updateBoxDisplay() {
    const boxes = els.letterBoxes.querySelectorAll('.letter-box');
    const inputs = els.letterBoxes.querySelectorAll('.letter-input');
    boxes.forEach((box, i) => {
      const hint = revealedPositions.find(h => h.position === i);
      if (hint) {
        box.textContent = hint.letter.toUpperCase();
        box.classList.remove('filled', 'correct', 'wrong', 'active', 'revealed');
        box.classList.add('hint');
        inputs[i].disabled = true;
        return;
      }
      const char = currentGuess[i] || '';
      box.textContent = char.toUpperCase();
      box.classList.remove('hint', 'correct', 'wrong', 'revealed');
      box.classList.toggle('filled', !!char);
      inputs[i].disabled = false;
    });
  }

  function updateGuessBtn() {
    const filled = currentGuess.filter(c => c !== '').length;
    els.guessBtn.disabled = filled !== wordLength || gameOver;
  }

  function updateHintBtn() {
    const remaining = MAX_HINTS - hintsUsed;
    if (remaining <= 0 || gameOver) {
      els.hintBtn.disabled = true;
      els.hintBtn.textContent = remaining <= 0 ? 'No hints left' : 'Hint';
    } else {
      els.hintBtn.disabled = false;
      els.hintBtn.textContent = `Hint (${remaining} left)`;
    }
  }

  function updateButtons() {
    updateHintBtn();
    updateGuessBtn();
    els.clearBtn.disabled = gameOver;
    els.giveUpBtn.disabled = gameOver;
  }

  // Clear — only non-hint boxes
  els.clearBtn.addEventListener('click', () => {
    if (gameOver) return;
    currentGuess = currentGuess.map((c, i) => isHintPosition(i) ? c : '');
    els.letterBoxes.querySelectorAll('.letter-input').forEach((input, i) => {
      if (!isHintPosition(i)) input.value = '';
    });
    updateBoxDisplay();
    updateGuessBtn();
    els.result.className = 'result';
    let first = 0;
    while (first < wordLength && isHintPosition(first)) first++;
    if (first < wordLength) focusBox(first);
  });

  // Hint
  els.hintBtn.addEventListener('click', async () => {
    if (hintsUsed >= MAX_HINTS || gameOver) return;
    const positions = revealedPositions.map(h => h.position);
    const query = positions.join(',');
    try {
      const res = await fetch(`${API_BASE}/hint?revealed=${query}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      revealedPositions.push({ position: data.position, letter: data.letter });
      currentGuess[data.position] = data.letter;
      hintsUsed++;
      updateBoxDisplay();
      updateButtons();
      saveState();
      let next = data.position + 1;
      while (next < wordLength && isHintPosition(next)) next++;
      if (next < wordLength) focusBox(next);
    } catch (err) {}
  });

  // Give up modal
  els.giveUpBtn.addEventListener('click', () => {
    if (gameOver) return;
    els.modalOverlay.classList.add('visible');
  });

  els.modalCancel.addEventListener('click', () => {
    els.modalOverlay.classList.remove('visible');
  });

  els.modalOverlay.addEventListener('click', (e) => {
    if (e.target === els.modalOverlay) els.modalOverlay.classList.remove('visible');
  });

  els.modalConfirm.addEventListener('click', async () => {
    els.modalOverlay.classList.remove('visible');
    await giveUp();
  });

  async function giveUp() {
    try {
      const res = await fetch(`${API_BASE}/reveal`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      gameOver = true;
      const word = data.word;
      word.split('').forEach((char, i) => { currentGuess[i] = char; });
      els.letterBoxes.querySelectorAll('.letter-input').forEach((input, i) => {
        input.value = currentGuess[i];
        input.disabled = true;
      });
      const boxes = els.letterBoxes.querySelectorAll('.letter-box');
      boxes.forEach((box, i) => {
        box.textContent = word[i].toUpperCase();
        box.classList.remove('filled', 'hint', 'correct', 'wrong', 'active');
        box.classList.add('revealed');
      });
      updateButtons();
      showGiveUpResult(word);
      saveState(word);
    } catch (err) {}
  }

  // Guess
  els.guessBtn.addEventListener('click', submitGuess);

  async function submitGuess() {
    const guess = currentGuess.join('');
    if (guess.length !== wordLength || gameOver) return;
    els.guessBtn.disabled = true;
    els.clearBtn.disabled = true;
    try {
      const res = await fetch(`${API_BASE}/guess`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guess }),
      });
      const data = await res.json();
      if (data.correct) {
        gameOver = true;
        els.letterBoxes.querySelectorAll('.letter-box').forEach(b => {
          b.classList.remove('filled', 'hint');
          b.classList.add('correct');
        });
        updateActiveBox();
        showResult(true);
        saveState();
        updateButtons();
      } else {
        els.letterBoxes.querySelectorAll('.letter-box').forEach(b => {
          if (b.classList.contains('filled')) b.classList.add('wrong');
        });
        showResult(false);
        setTimeout(() => {
          els.letterBoxes.querySelectorAll('.letter-box').forEach(b => b.classList.remove('wrong'));
        }, 400);
        els.clearBtn.disabled = false;
        els.guessBtn.disabled = false;
        focusBox(0);
      }
    } catch (err) {
      els.result.className = 'result error';
      els.result.innerHTML = '<span class="result-emoji">⚠️</span><span class="result-title">Something went wrong</span>Please try again.';
      els.clearBtn.disabled = false;
      els.guessBtn.disabled = false;
    }
  }

  function showResult(correct) {
    const el = els.result;
    if (correct) {
      el.className = 'result success';
      el.innerHTML = '<span class="result-emoji">✨</span><span class="result-title">Well done!</span>You guessed today\'s word correctly.';
    } else {
      el.className = 'result error';
      el.innerHTML = '<span class="result-emoji">🔍</span><span class="result-title">Not quite</span>Try again — you\'ve got this.';
    }
  }

  function showGiveUpResult(word) {
    const el = els.result;
    el.className = 'result giveup';
    el.innerHTML = `<span class="result-emoji">📖</span><span class="result-title">The word was: ${word}</span>Come back tomorrow for a new word.`;
  }

  function saveState(revealedWord) {
    const state = {
      date: window.currentWordDate,
      hints: revealedPositions,
      hintsUsed,
    };
    if (gameOver) {
      if (revealedWord) {
        state.givenUp = true;
        state.revealedWord = revealedWord;
      } else {
        state.guess = currentGuess.join('');
      }
    }
    localStorage.setItem('wotd-result', JSON.stringify(state));
  }

  function restoreState(data, saved) {
    if (!saved || saved.date !== data.date) return false;

    // Restore hints
    if (saved.hints && saved.hints.length > 0) {
      revealedPositions = saved.hints;
      hintsUsed = saved.hintsUsed || saved.hints.length;
      revealedPositions.forEach(h => { currentGuess[h.position] = h.letter; });
    }

    if (saved.givenUp && saved.revealedWord) {
      gameOver = true;
      const word = saved.revealedWord;
      word.split('').forEach((char, i) => { currentGuess[i] = char; });
      els.letterBoxes.querySelectorAll('.letter-input').forEach((input, i) => {
        input.value = currentGuess[i];
        input.disabled = true;
      });
      els.letterBoxes.querySelectorAll('.letter-box').forEach((box, i) => {
        box.textContent = word[i].toUpperCase();
        box.classList.remove('filled', 'hint', 'correct', 'wrong', 'active');
        box.classList.add('revealed');
      });
      showGiveUpResult(word);
      updateButtons();
      return true;
    }

    if (saved.guess) {
      gameOver = true;
      saved.guess.split('').forEach((char, i) => { currentGuess[i] = char; });
      els.letterBoxes.querySelectorAll('.letter-input').forEach((input, i) => {
        input.value = currentGuess[i] || '';
      });
      updateBoxDisplay();
      els.letterBoxes.querySelectorAll('.letter-box').forEach(b => {
        b.classList.remove('filled', 'hint');
        b.classList.add('correct');
      });
      showResult(true);
      updateButtons();
      return true;
    }

    // Hints restored but still playing
    updateBoxDisplay();
    updateButtons();
    return false;
  }

  async function fetchWord() {
    try {
      const res = await fetch(`${API_BASE}/today`);
      if (!res.ok) throw new Error('No word');
      const data = await res.json();

      wordLength = data.length;
      window.currentWordDate = data.date;

      els.dateLabel.textContent = data.date
        ? formatDate(data.date)
        : new Date().toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
          }).toUpperCase();

      els.partOfSpeech.textContent = data.partOfSpeech || '';
      els.definition.textContent = data.definition;
      els.wordLengthHint.textContent = `${wordLength} letters`;

      buildBoxes(wordLength);

      els.loading.style.display = 'none';
      els.game.style.display = 'block';

      const savedRaw = localStorage.getItem('wotd-result');
      if (savedRaw) {
        const saved = JSON.parse(savedRaw);
        const restored = restoreState(data, saved);
        if (restored) return;
      }

      updateButtons();
      setTimeout(() => focusBox(0), 100);
    } catch (err) {
      els.loading.style.display = 'none';
      els.errorState.style.display = 'block';
      els.dateLabel.textContent = new Date().toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      }).toUpperCase();
    }
  }

  fetchWord();
</script>
</body>
</html>
